# =============================================================================
# Nord Theme for tmux
# https://www.nordtheme.com/
# =============================================================================

# Nord Palette
# Polar Night:  #2E3440 #3B4252 #434C5E #4C566A
# Snow Storm:   #D8DEE9 #E5E9F0 #ECEFF4
# Frost:        #8FBCBB #88C0D0 #81A1C1 #5E81AC
# Aurora:       #BF616A #D08770 #EBCB8B #A3BE8C #B48EAD

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#2E3440,fg=#D8DEE9"

# Status bar length
set -g status-left-length 50
set -g status-right-length 100

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#81A1C1,fg=#2E3440,bold] #S #[bg=#2E3440,fg=#81A1C1]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

# Separator between windows
setw -g window-status-separator ""

# Window with activity
setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#[bg=#2E3440,fg=#3B4252]#[bg=#3B4252,fg=#4C566A] %H:%M #[bg=#3B4252,fg=#81A1C1]#[bg=#81A1C1,fg=#2E3440,bold] #h "

# -----------------------------------------------------------------------------
# Status Format Rows 2 & 3 - cc-tmux session/usage + beads bars
# -----------------------------------------------------------------------------

# Row 2 (session-bar): session-count glyph + model-letter + project>branch on the
# left, account + SES/5H/7D usage gauges on the right. cc-tmux emits its own
# semantic fg color codes internally (same as status-right's usage segment); the
# bg wrapper matches this theme's status-style background so the row blends in.
# Published by the render-all job in tmux.conf.tmpl (status-format[0]), not by
# its own #() job — bare #{@cc-row-*} option lookup, zero extra spawns (plan 005).
# Portrait multi-row (cc-tmux-mobile-portrait-tabs task 3.2): the physical row a
# given status-format[K] entry renders is now computed from @cc-tab-rows (N),
# set by the render-all job. Landscape (N==1): [1]=session, [2]=beads —
# byte-identical to the former static assignments. Portrait (N>1): tab rows
# 1..N-1 (published as @cc-tab-row-K) flow into [1..N-1], pushing session to [N]
# and beads to [N+1]. render-all grows `status` to N+2 (max 5 -> N<=3), so [3]
# and [4] only ever render in portrait. Continuation tab rows carry no #[bg]
# wrapper (they inherit status-style, same as status-format[0]); session/beads
# keep this theme's #[bg] wrapper wherever they land.
set -g status-format[1] "#{?#{==:#{@cc-tab-rows},1},#[bg=#2E3440]#{@cc-row-session},#{@cc-tab-row-1}}"
set -g status-format[2] "#{?#{==:#{@cc-tab-rows},1},#[bg=#2E3440]#{@cc-row-beads},#{?#{==:#{@cc-tab-rows},2},#[bg=#2E3440]#{@cc-row-session},#{@cc-tab-row-2}}}"
set -g status-format[3] "#{?#{==:#{@cc-tab-rows},2},#[bg=#2E3440]#{@cc-row-beads},#[bg=#2E3440]#{@cc-row-session}}"
set -g status-format[4] "#[bg=#2E3440]#{@cc-row-beads}"

# -----------------------------------------------------------------------------
# Pane Borders
# -----------------------------------------------------------------------------

set -g pane-border-style "fg=#434C5E"
set -g pane-active-border-style "fg=#88C0D0"

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#81A1C1,fg=#2E3440,bold"
set -g message-command-style "bg=#81A1C1,fg=#2E3440"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#81A1C1,fg=#2E3440"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#88C0D0"
