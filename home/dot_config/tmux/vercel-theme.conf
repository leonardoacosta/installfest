# =============================================================================
# Vercel Theme for tmux
# Real Vercel Geist design-system dark-mode tokens (vercel.com/design.dark.md,
# fetched 2026-07-07) -- not an "inspired by" derivative like one-hunter-vercel.
# =============================================================================

# Vercel Geist Dark Colors
# Background:    #000000  (background-100)
# Foreground:    #ededed  (primary / gray-1000)
# Blue:          #006efe  (blue-700 / tertiary -- Vercel's signature brand blue)
# Red:           #f13242  (red-700)
# Green:         #00ac3a  (green-700)
# Amber:         #ffae00  (amber-700)
# Purple:        #9440d5  (purple-700)
# Teal:          #00aa95  (teal-700)
# Inactive:      #454545  (gray-500)
# Pill bg:       #0a0a0a  (off-black, matches one-hunter-vercel's existing convention)

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#000000,fg=#ededed"

# Status bar length
set -g status-left-length 50
set -g status-right-length 150

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#006efe,fg=#000000,bold] #S #[bg=#000000,fg=#006efe]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

# Separator between windows
setw -g window-status-separator ""

# Window with activity
setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#[bg=#000000,fg=#0a0a0a]#[bg=#0a0a0a,fg=#454545] %H:%M #[bg=#0a0a0a,fg=#006efe]#[bg=#006efe,fg=#000000,bold] #h "

# -----------------------------------------------------------------------------
# Status Format Rows 2 & 3 - cc-tmux session/usage + beads bars
# -----------------------------------------------------------------------------

# Row 2 (session-bar): session-count glyph + model-letter + project>branch on the
# left, account + SES/5H/7D usage gauges on the right. cc-tmux emits its own
# semantic fg color codes internally (same as status-right's usage segment); the
# bg wrapper matches this theme's status-style background so the row blends in.
# Published by the render-all job in tmux.conf.tmpl (status-format[0]), not by
# its own #() job — bare #{@cc-row-*} option lookup, zero extra spawns (plan 005).
# Portrait multi-row (cc-tmux-mobile-portrait-tabs task 3.2): status-format[K]'s
# physical row is computed from @cc-tab-rows (N) set by render-all. Landscape
# (N==1): [1]=session, [2]=beads (byte-identical to the former static lines).
# Portrait (N>1): tab rows 1..N-1 (@cc-tab-row-K) fill [1..N-1], pushing session
# to [N] and beads to [N+1]; render-all grows `status` to N+2 (max 5, N<=3).
set -g status-format[1] "#{?#{==:#{@cc-tab-rows},1},#[bg=#000000]#{@cc-row-session},#{@cc-tab-row-1}}"

# Row 3 (beads-bar): roadmap-pulse content (next actionable item + open/ready
# counts), or empty when nothing is pending. Published by the render-all job
# in tmux.conf.tmpl, not by its own #() job (plan 005).
set -g status-format[2] "#{?#{==:#{@cc-tab-rows},1},#[bg=#000000]#{@cc-row-beads},#{?#{==:#{@cc-tab-rows},2},#[bg=#000000]#{@cc-row-session},#{@cc-tab-row-2}}}"

# Row 4 (cc-tmux-row4-session-title task 3.2): agents-row (@cc-row-agents) —
# focused-window session title (foreground-only) or a per-sub-agent glyph
# strip. Occupies status-format[@cc-tab-rows + 2], same computed-index chain
# rows 2/3 above use: N==2 -> [3] is beads (unchanged from before this task,
# session already landed at [3] one step earlier via the N==2 branch above);
# N==1 -> [3] is agents (new); else (N==3, portrait 3-row cap) -> [3] falls
# through to session, matching the existing else-branch — the agents row is
# never reachable at N==3 since render-all forces it empty and caps `status`
# at 5 before this row would be read. [4] mirrors: N==3 -> beads (unchanged);
# else -> agents (covers the N==2-with-content case; N==1's [4] slot is never
# rendered since `status` maxes at 4 there, so the else value is unreached
# but still semantically correct). Styling: DIM-leaning, distinct from
# session/beads' plain #[bg=...]-only wrapper — `fg` tints the row in this
# theme's own accent (Vercel signature blue, same hue as status-left/
# message-style) with the `dim` attribute so the row reads lower-emphasis
# than session/beads; render_agents_row itself emits no fg codes (title and
# glyphs share one wrapper — the theme layer has no way to color them
# differently from a single opaque string).
set -g status-format[3] "#{?#{==:#{@cc-tab-rows},2},#[bg=#000000]#{@cc-row-beads},#{?#{==:#{@cc-tab-rows},1},#[bg=#000000,fg=#006efe,dim]#{@cc-row-agents},#[bg=#000000]#{@cc-row-session}}}"
set -g status-format[4] "#{?#{==:#{@cc-tab-rows},3},#[bg=#000000]#{@cc-row-beads},#[bg=#000000,fg=#006efe,dim]#{@cc-row-agents}}"

# -----------------------------------------------------------------------------
# Pane Borders
# -----------------------------------------------------------------------------

set -g pane-border-style "fg=#454545"
set -g pane-active-border-style "fg=#006efe"

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#006efe,fg=#000000,bold"
set -g message-command-style "bg=#006efe,fg=#000000"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#006efe,fg=#000000"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#006efe"
