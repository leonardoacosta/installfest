# =============================================================================
# Vercel Theme for tmux
# Real Vercel Geist design-system dark-mode tokens (vercel.com/design.dark.md,
# fetched 2026-07-07) -- not an "inspired by" derivative like one-hunter-vercel.
# =============================================================================

# Vercel Geist Dark Colors
# Background:    #000000  (background-100)
# Foreground:    #ededed  (primary / gray-1000)
# Blue:          #006efe  (blue-700 / tertiary -- Vercel's signature brand blue)
# Red:           #f13242  (red-700)
# Green:         #00ac3a  (green-700)
# Amber:         #ffae00  (amber-700)
# Purple:        #9440d5  (purple-700)
# Teal:          #00aa95  (teal-700)
# Inactive:      #454545  (gray-500)
# Pill bg:       #0a0a0a  (off-black, matches one-hunter-vercel's existing convention)

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#000000,fg=#ededed"

# Status bar length
set -g status-left-length 50
set -g status-right-length 150

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#006efe,fg=#000000,bold] #S #[bg=#000000,fg=#006efe]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

# Separator between windows
setw -g window-status-separator ""

# Inactive windows (tabs)
setw -g window-status-format "#[bg=#0a0a0a,fg=#000000]#[bg=#0a0a0a,fg=#454545] #I #W #[bg=#000000,fg=#0a0a0a]"

# Active window (current tab) - Vercel signature blue
setw -g window-status-current-format "#[bg=#006efe,fg=#000000]#[bg=#006efe,fg=#000000,bold] #I #W #[bg=#000000,fg=#006efe]"

# Window with activity
setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#(~/.tmux/plugins/cc-tmux/bin/cc-tmux usage)  #[bg=#000000,fg=#0a0a0a]#[bg=#0a0a0a,fg=#454545] %H:%M #[bg=#0a0a0a,fg=#006efe]#[bg=#006efe,fg=#000000,bold] #h "

# -----------------------------------------------------------------------------
# Pane Borders
# -----------------------------------------------------------------------------

set -g pane-border-style "fg=#454545"
set -g pane-active-border-style "fg=#006efe"

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#006efe,fg=#000000,bold"
set -g message-command-style "bg=#006efe,fg=#000000"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#006efe,fg=#000000"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#006efe"
