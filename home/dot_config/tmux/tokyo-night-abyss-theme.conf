# =============================================================================
# Tokyo Night Abyss Theme for tmux
# Palette derived from starship.toml.tmpl § palettes.tokyo-night-abyss
# =============================================================================

# Tokyo Night Abyss Colors
# Background:    #0D0E15
# Foreground:    #9AA3C4
# Blue:          #5278C4
# Cyan:          #5099C4
# Teal:          #4EA596
# Red:           #C4546E
# Orange:        #C97A4A
# Green:         #729947
# Yellow:        #A87F4A
# Purple:        #8E6DC4
# Off-black 1:   #1A1B26  (subtle border, dim divider)
# Off-black 2:   #2A2D44  (focused border, gray slot)

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#0D0E15,fg=#9AA3C4"

set -g status-left-length 50
set -g status-right-length 150

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#5278C4,fg=#0D0E15,bold] #S #[bg=#0D0E15,fg=#5278C4]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

setw -g window-status-separator ""

# Inactive windows. #(cc-tmux window-icon) is the animated tab icon
# (apps/cc-tmux render.animated_icon) — re-invoked on every status-bar
# refresh (status-interval), which drives the animation; it prints its own
# trailing space when tracked, nothing otherwise (no literal space before #W).
setw -g window-status-format "#[bg=#16161E,fg=#0D0E15]#[bg=#16161E,fg=#3A3F59] #I #(~/.tmux/plugins/cc-tmux/bin/cc-tmux window-icon #{window_id})#W #[bg=#0D0E15,fg=#16161E]"

# Active window — purple accent for Tokyo Night identity
setw -g window-status-current-format "#[bg=#8E6DC4,fg=#0D0E15]#[bg=#8E6DC4,fg=#0D0E15,bold] #I #(~/.tmux/plugins/cc-tmux/bin/cc-tmux window-icon #{window_id})#W #[bg=#0D0E15,fg=#8E6DC4]"

setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#[bg=#0D0E15,fg=#16161E]#[bg=#16161E,fg=#3A3F59] %H:%M #[bg=#16161E,fg=#5278C4]#[bg=#5278C4,fg=#0D0E15,bold] #h "

# -----------------------------------------------------------------------------
# Status Format Rows 2 & 3 - cc-tmux session/usage + beads bars
# -----------------------------------------------------------------------------

# Row 2 (session-bar): session-count glyph + model-letter + project>branch on the
# left, account + SES/5H/7D usage gauges on the right. cc-tmux emits its own
# semantic fg color codes internally (same as status-right's usage segment); the
# bg wrapper matches this theme's status-style background so the row blends in.
set -g status-format[1] "#[bg=#0D0E15]#(~/.tmux/plugins/cc-tmux/bin/cc-tmux session-bar #{window_id})"

# Row 3 (beads-bar): roadmap-pulse content (next actionable item + open/ready
# counts), or empty when nothing is pending.
set -g status-format[2] "#[bg=#0D0E15]#(~/.tmux/plugins/cc-tmux/bin/cc-tmux beads-bar #{window_id})"

# -----------------------------------------------------------------------------
# Pane Borders — thin off-black, visible against #0D0E15 bg
# -----------------------------------------------------------------------------

# Single-line box-drawing for thin Unicode characters (│ ─ ┼)
set -g pane-border-lines single

# Off-black family but with enough lightness delta against bg to actually render.
# Inactive: #3A3F59 — abyss "dim-fg" slot (~22% L vs bg's ~5%, clearly visible)
# Active:   #5278C4 — abyss blue, unambiguous focus indicator
set -g pane-border-style "fg=#3A3F59"
set -g pane-active-border-style "fg=#5278C4"

# Always-on per-pane title bar (renders even with a single pane, so the "border"
# is visible regardless of split state). Toggle off via: set -g pane-border-status off
set -g pane-border-status top
set -g pane-border-format " #[fg=#9AA3C4]#{pane_index}#[fg=#3A3F59] │ #[fg=#5099C4]#{pane_current_command}#[fg=#3A3F59] · #[fg=#3A3F59]#{pane_current_path} "

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#5278C4,fg=#0D0E15,bold"
set -g message-command-style "bg=#5278C4,fg=#0D0E15"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#5278C4,fg=#0D0E15"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#5278C4"
