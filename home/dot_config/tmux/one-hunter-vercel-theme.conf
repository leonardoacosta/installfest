# =============================================================================
# One Hunter Vercel Theme for tmux
# Inspired by https://github.com/Railly/one-hunter-vscode
# =============================================================================

# One Hunter Vercel Colors
# Background:    #000000
# Foreground:    #DCE3EA
# Blue:          #43AAF9
# Pink/Magenta:  #DD4F7D
# Cyan:          #5BD1B9
# Yellow:        #FAC760
# Purple:        #B267E6
# Red:           #E61F44
# Inactive:      #454D54

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#000000,fg=#DCE3EA"

# Status bar length
set -g status-left-length 50
set -g status-right-length 150

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#43AAF9,fg=#000000,bold] #S #[bg=#000000,fg=#43AAF9]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

# Separator between windows
setw -g window-status-separator ""

# Window with activity
setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#[bg=#000000,fg=#0A0A0A]#[bg=#0A0A0A,fg=#454D54] %H:%M #[bg=#0A0A0A,fg=#43AAF9]#[bg=#43AAF9,fg=#000000,bold] #h "

# -----------------------------------------------------------------------------
# Status Format Rows 2 & 3 - cc-tmux session/usage + beads bars
# -----------------------------------------------------------------------------

# Row 2 (session-bar): session-count glyph + model-letter + project>branch on the
# left, account + SES/5H/7D usage gauges on the right. cc-tmux emits its own
# semantic fg color codes internally (same as status-right's usage segment); the
# bg wrapper matches this theme's status-style background so the row blends in.
# Published by the render-all job in tmux.conf.tmpl (status-format[0]), not by
# its own #() job — bare #{@cc-row-*} option lookup, zero extra spawns (plan 005).
# Portrait multi-row (cc-tmux-mobile-portrait-tabs task 3.2): status-format[K]'s
# physical row is computed from @cc-tab-rows (N) set by render-all. Landscape
# (N==1): [1]=session, [2]=beads (byte-identical to the former static lines).
# Portrait (N>1): tab rows 1..N-1 (@cc-tab-row-K) fill [1..N-1], pushing session
# to [N] and beads to [N+1]; render-all grows `status` to N+2 (max 5, N<=3).
set -g status-format[1] "#{?#{==:#{@cc-tab-rows},1},#[bg=#000000]#{@cc-row-session},#{@cc-tab-row-1}}"

# Row 3 (beads-bar): roadmap-pulse content (next actionable item + open/ready
# counts), or empty when nothing is pending. Published by the render-all job
# in tmux.conf.tmpl, not by its own #() job (plan 005).
set -g status-format[2] "#{?#{==:#{@cc-tab-rows},1},#[bg=#000000]#{@cc-row-beads},#{?#{==:#{@cc-tab-rows},2},#[bg=#000000]#{@cc-row-session},#{@cc-tab-row-2}}}"
set -g status-format[3] "#{?#{==:#{@cc-tab-rows},2},#[bg=#000000]#{@cc-row-beads},#[bg=#000000]#{@cc-row-session}}"
set -g status-format[4] "#[bg=#000000]#{@cc-row-beads}"

# -----------------------------------------------------------------------------
# Pane Borders
# -----------------------------------------------------------------------------

set -g pane-border-style "fg=#454D54"
set -g pane-active-border-style "fg=#43AAF9"

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#43AAF9,fg=#000000,bold"
set -g message-command-style "bg=#43AAF9,fg=#000000"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#43AAF9,fg=#000000"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#43AAF9"
