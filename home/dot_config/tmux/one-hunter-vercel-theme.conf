# =============================================================================
# One Hunter Vercel Theme for tmux
# Inspired by https://github.com/Railly/one-hunter-vscode
# =============================================================================

# One Hunter Vercel Colors
# Background:    #000000
# Foreground:    #DCE3EA
# Blue:          #43AAF9
# Pink/Magenta:  #DD4F7D
# Cyan:          #5BD1B9
# Yellow:        #FAC760
# Purple:        #B267E6
# Red:           #E61F44
# Inactive:      #454D54

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#000000,fg=#DCE3EA"

# Status bar length
set -g status-left-length 50
set -g status-right-length 150

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#43AAF9,fg=#000000,bold] #S #[bg=#000000,fg=#43AAF9]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

# Separator between windows
setw -g window-status-separator ""

# Inactive windows (tabs). #(cc-tmux window-icon) is the animated tab icon
# (apps/cc-tmux render.animated_icon) — re-invoked on every status-bar
# refresh (status-interval), which drives the animation; it prints its own
# trailing space when tracked, nothing otherwise (no literal space before #W).
setw -g window-status-format "#[bg=#0A0A0A,fg=#000000]#[bg=#0A0A0A,fg=#454D54] #I #(~/.tmux/plugins/cc-tmux/bin/cc-tmux window-icon #{window_id})#W #[bg=#000000,fg=#0A0A0A]"

# Active window (current tab) - using pink accent
setw -g window-status-current-format "#[bg=#DD4F7D,fg=#000000]#[bg=#DD4F7D,fg=#000000,bold] #I #(~/.tmux/plugins/cc-tmux/bin/cc-tmux window-icon #{window_id})#W #[bg=#000000,fg=#DD4F7D]"

# Window with activity
setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#(~/.tmux/plugins/cc-tmux/bin/cc-tmux usage)  #[bg=#000000,fg=#0A0A0A]#[bg=#0A0A0A,fg=#454D54] %H:%M #[bg=#0A0A0A,fg=#43AAF9]#[bg=#43AAF9,fg=#000000,bold] #h "

# -----------------------------------------------------------------------------
# Status Format Rows 2 & 3 - cc-tmux session/usage + beads bars
# -----------------------------------------------------------------------------

# Row 2 (session-bar): session-count glyph + model-letter + project>branch on the
# left, account + SES/5H/7D usage gauges on the right. cc-tmux emits its own
# semantic fg color codes internally (same as status-right's usage segment); the
# bg wrapper matches this theme's status-style background so the row blends in.
set -g status-format[1] "#[bg=#000000]#(~/.tmux/plugins/cc-tmux/bin/cc-tmux session-bar #{window_id})"

# Row 3 (beads-bar): roadmap-pulse content (next actionable item + open/ready
# counts), or empty when nothing is pending.
set -g status-format[2] "#[bg=#000000]#(~/.tmux/plugins/cc-tmux/bin/cc-tmux beads-bar #{window_id})"

# -----------------------------------------------------------------------------
# Pane Borders
# -----------------------------------------------------------------------------

set -g pane-border-style "fg=#454D54"
set -g pane-active-border-style "fg=#43AAF9"

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#43AAF9,fg=#000000,bold"
set -g message-command-style "bg=#43AAF9,fg=#000000"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#43AAF9,fg=#000000"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#43AAF9"
