# Projects Registry -- single source of truth
# Consumed by: generate-raycast.sh, cmux-workspaces.sh, mux-remote.sh
#
# Fields:
#   code      Short code used for script names and cmux workspaces
#   name      Human-readable project name
#   category  One of: "b-and-b", "priceless", "personal"
#   icon      Emoji icon for Raycast metadata
#   path      Relative path from home dir (e.g. "dev/oo" or ".claude")
#   tiers     Deployment tiers: "remote" (SSH homelab), "local" (Mac), "cloudpc" (SSH cloudpc)

[defaults]
ssh_host = "homelab"
ssh_user = "nyaptor"
ssh_base = "/home/nyaptor"
local_base_mac = "$HOME"
local_base_linux = "$HOME"
cloudpc_host = "cloudpc"
cloudpc_base = "C:/Users/LeonardoAcosta"
cloudpc_dev = "C:/Users/LeonardoAcosta/source/repos"

