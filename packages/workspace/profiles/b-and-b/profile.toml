# b-and-b workspace profile
#
# Consumed by packages/workspace/bin/wk-ready (and future wk-* commands).
# Sibling files in this dir (env.sh, claude/, wrappers/) are unrelated to
# this config — those are sourced by wsenv at activation time.

# Task tracker: Azure DevOps work items (project "Wholesale Architecture").
# Decision recorded 2026-06-01: B&B portfolio is moving off beads to ADO as
# the canonical work tracker.
[tracker]
kind = "ado"

[tracker.ado]
org_url = "https://dev.azure.com/bbins"

# Project GUID required because az boards' argparse splits the project name
# "Wholesale Architecture" on whitespace (azure-devops extension 1.0.2 bug).
# See packages/workspace/lib/trackers/README.md § ADO setup for how to fetch.
#
# This is intentionally LEFT BLANK so wk-ready exits gracefully ([]) instead
# of querying an unauthenticated ADO surface. To populate:
#   1. Run `az devops login --organization https://dev.azure.com/bbins`
#      (or `export AZURE_DEVOPS_EXT_PAT=<pat>`) under the BBAdmin identity.
#   2. Run:
#      az devops project show \
#        --organization https://dev.azure.com/bbins \
#        --project 'Wholesale Architecture' \
#        --query id -o tsv
#   3. Paste the GUID below, commit, run `chezmoi apply`.
project_id = ""
